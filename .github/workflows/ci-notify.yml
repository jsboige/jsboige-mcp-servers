name: CI Failure Notification

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  notify-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      issues: write
    steps:
    - name: Create issue on CI failure
      uses: actions/github-script@v7
      with:
        script: |
          const runUrl = `${context.payload.workflow_run.html_url}`;
          const commitSha = context.payload.workflow_run.head_sha.substring(0, 7);
          const commitMsg = context.payload.workflow_run.head_commit?.message?.split('\n')[0] || 'unknown';
          const actor = context.payload.workflow_run.actor?.login || 'unknown';

          // Check for existing open CI failure issues to avoid duplicates
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'ci-failure',
            per_page: 5
          });

          if (existingIssues.data.length > 0) {
            // Comment on existing issue instead of creating new one
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssues.data[0].number,
              body: `## CI Failed Again\n\n- **Commit:** \`${commitSha}\` - ${commitMsg}\n- **Author:** @${actor}\n- **Run:** ${runUrl}\n- **Date:** ${new Date().toISOString().split('T')[0]}`
            });
            return;
          }

          // Create new issue
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `[CI] Build failure on main (${commitSha})`,
            labels: ['ci-failure', 'bug'],
            body: `## CI Pipeline Failed\n\n- **Commit:** \`${commitSha}\` - ${commitMsg}\n- **Author:** @${actor}\n- **Run:** ${runUrl}\n- **Date:** ${new Date().toISOString().split('T')[0]}\n\n## Action Required\n\n1. Check the [failed run](${runUrl}) for error details\n2. Fix the failing tests/build\n3. Push the fix to main\n4. Close this issue when CI is green again\n\n---\n*Auto-generated by CI notification workflow*`
          });
